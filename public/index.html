<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WarZone: Ukraine Conflict RP</title>
    <style>
        :root {
            --bg: #08080c; --panel: #0e0e16; --border: #1e1e2a; --text: #c0c0cc;
            --gold: #c8a840; --rus-red: #b82828; --ukr-blue: #2860b8; --orange: #c87028;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            height: 100vh; height: 100dvh; overflow: hidden; touch-action: manipulation;
        }
        #app { display: grid; grid-template-columns: 1fr 1.2fr; height: 100vh; height: 100dvh; }

        /* КАРТА */
        #map-panel { position: relative; overflow: hidden; border-right: 2px solid var(--border); background: #0d1a0d; }
        #map-svg { width: 100%; height: 100%; }
        .map-bg-element { stroke: #1a3a1a; stroke-width: 0.5; fill: none; }
        .loc-point { cursor: pointer; transition: all 0.3s; filter: drop-shadow(0 0 4px rgba(0,0,0,0.8)); }
        .loc-point.russia { fill: rgba(200,30,30,0.85); stroke: #ff6666; stroke-width: 2; }
        .loc-point.ukraine { fill: rgba(30,70,200,0.85); stroke: #6688ff; stroke-width: 2; }
        .loc-point.contested { fill: rgba(255,130,0,0.8); stroke: #ffaa44; stroke-width: 2; animation: pulse 2s infinite; }
        .loc-point.current { stroke: #fff !important; stroke-width: 4 !important; stroke-dasharray: 4 2; animation: dashMove 1s linear infinite; }
        @keyframes pulse { 0%,100%{r:15} 50%{r:20} }
        @keyframes dashMove { to{stroke-dashoffset:-12} }
        .loc-label { fill: #fff; font-size: 9px; font-weight: bold; text-anchor: middle; pointer-events: none; paint-order: stroke; stroke: #000; stroke-width: 3px; }
        .player-dot { transition: all 0.5s; pointer-events: none; }
        #map-legend { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.9); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 0.68rem; z-index: 10; min-width: 140px; }
        #map-legend h4 { color: var(--gold); margin-bottom: 4px; font-size: 0.75rem; }
        .legend-row { display: flex; align-items: center; gap: 4px; margin: 2px 0; }
        .legend-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
        .legend-dot.russia { background: var(--rus-red); } .legend-dot.ukraine { background: var(--ukr-blue); } .legend-dot.contested { background: var(--orange); }
        #players-on-location { margin-top: 5px; font-size: 0.6rem; color: #aaa; max-height: 60px; overflow-y: auto; }
        #class-info { margin-top: 4px; font-size: 0.6rem; color: var(--gold); }

        /* ЧАТ */
        #chat-panel { display: flex; flex-direction: column; background: var(--panel); height: 100%; overflow: hidden; }
        #auth-screen { padding: 12px; border-bottom: 2px solid var(--border); background: #101018; overflow-y: auto; flex-shrink: 0; }
        #auth-screen.hidden { display: none; }
        #auth-screen h2 { text-align: center; color: var(--gold); font-size: 0.95rem; margin-bottom: 6px; }
        .faction-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 6px; }
        .faction-card { padding: 8px; border: 2px solid #222; border-radius: 6px; cursor: pointer; text-align: center; font-weight: bold; font-size: 0.8rem; background: transparent; color: #fff; }
        .faction-card.russia-card { border-color: #4a1a1a; } .faction-card.russia-card.selected { background: #2a1018; border-color: var(--rus-red); }
        .faction-card.ukraine-card { border-color: #1a2a4a; } .faction-card.ukraine-card.selected { background: #101c3a; border-color: var(--ukr-blue); }
        .units-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 6px; }
        .unit-card { padding: 6px; border: 2px solid #2a2a2a; border-radius: 5px; cursor: pointer; text-align: center; background: #14141c; font-size: 0.7rem; }
        .unit-card.selected { border-color: var(--gold); background: #1a1a28; } .unit-card .unit-emblem { font-size: 1.3rem; display: block; }
        #char-form { display: flex; flex-direction: column; gap: 5px; }
        #char-form input, #char-form select { padding: 6px; background: #1a1a24; border: 1px solid #333; color: #fff; border-radius: 4px; font-size: 0.75rem; }
        .btn-primary { padding: 8px; background: var(--gold); color: #000; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }
        .btn-primary:disabled { background: #444; color: #888; }

        #player-bar { display: none; padding: 5px 8px; background: #0c0c16; border-bottom: 1px solid var(--border); font-size: 0.68rem; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 3px; flex-shrink: 0; }
        #player-bar.active { display: flex; }
        .hp-bar-outer { width: 50px; height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
        .hp-bar-inner { height: 100%; background: #4a4; transition: width 0.4s; }
        .hp-bar-inner.low { background: #a44; } .hp-bar-inner.critical { background: #a22; animation: blink 0.5s infinite; }
        @keyframes blink { 50%{opacity:0.3} }

        #messages-box { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 4px; -webkit-overflow-scrolling: touch; }
        .msg { padding: 5px 8px; border-radius: 5px; max-width: 85%; font-size: 0.72rem; line-height: 1.3; animation: msgIn 0.2s; }
        @keyframes msgIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }
        .msg.ai { background: #141420; border-left: 3px solid var(--gold); align-self: flex-start; }
        .msg.commander { background: #1a1420; border-left: 3px solid #a040d0; align-self: flex-start; color: #d0c0e0; }
        .msg.player { background: #141c14; border-right: 3px solid #4a7a4a; align-self: flex-end; color: #b8c8b8; }
        .msg.system { background: #181818; color: #777; align-self: center; font-style: italic; font-size: 0.65rem; text-align: center; }
        .msg.kill { background: #1a1010; border: 1px solid #4a2020; color: #d08080; align-self: center; text-align: center; }
        .msg.control { background: #101a10; border: 1px solid #2a4a2a; color: #80c080; align-self: center; text-align: center; }
        .msg.old { opacity: 0.3; }

        #input-area { padding: 6px; border-top: 2px solid var(--border); display: flex; gap: 5px; background: #0e0e16; flex-shrink: 0; }
        #action-input { flex: 1; padding: 7px 10px; background: #1a1a24; border: 1px solid #333; color: #fff; border-radius: 16px; font-size: 0.75rem; }
        #action-input:disabled { opacity: 0.4; }
        .btn-send { width: 34px; height: 34px; border-radius: 50%; background: var(--gold); color: #000; border: none; font-size: 0.9rem; cursor: pointer; flex-shrink: 0; }
        .btn-send:disabled { background: #333; color: #666; }

        #quick-actions { display: none; padding: 4px 6px; gap: 3px; flex-wrap: wrap; border-top: 1px solid var(--border); background: #0a0a12; flex-shrink: 0; }
        #quick-actions.active { display: flex; }
        .quick-btn { padding: 4px 7px; background: #1a1a28; border: 1px solid #333; color: #bbb; border-radius: 10px; font-size: 0.65rem; cursor: pointer; }
        .quick-btn.move-btn { border-color: #2a4a2a; color: #8c8; }
        .quick-btn.heal-btn { border-color: #2a3a4a; color: #8ac; }
        .quick-btn.order-btn { border-color: #4a2a4a; color: #c8a; }

        @media (max-width: 768px) {
            #app { grid-template-columns: 1fr; grid-template-rows: 35vh 1fr; }
            #map-panel { border-right: none; border-bottom: 2px solid var(--border); }
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="map-panel">
            <svg id="map-svg" viewBox="0 0 600 500"></svg>
            <div id="map-legend">
                <h4>📍 КАРТА</h4>
                <div class="legend-row"><span class="legend-dot russia"></span> РФ: <b id="rus-total">0</b></div>
                <div class="legend-row"><span class="legend-dot ukraine"></span> ВСУ: <b id="ukr-total">0</b></div>
                <div class="legend-row"><span class="legend-dot contested"></span> Бои: <b id="cont-total">0</b></div>
                <div style="margin-top:4px;font-size:0.6rem;">👥 Онлайн: <b id="players-online">0</b></div>
                <div id="players-on-location"></div>
                <div id="class-info"></div>
            </div>
        </div>

        <div id="chat-panel">
            <div id="auth-screen">
                <h2>⚔️ WARZONE RP</h2>
                <div class="faction-grid">
                    <button class="faction-card russia-card" data-faction="russia" onclick="selectFaction('russia')">🇷🇺 ВС РФ</button>
                    <button class="faction-card ukraine-card" data-faction="ukraine" onclick="selectFaction('ukraine')">🇺🇦 ВСУ</button>
                </div>
                <div class="units-grid" id="units-grid" style="display:none;"></div>
                <div id="char-form" style="display:none;">
                    <input type="text" id="inp-name" placeholder="Позывной" maxlength="20">
                    <select id="inp-class">
                        <option value="rifleman">🔫 Стрелок (+выживаемость)</option>
                        <option value="sniper">🎯 Снайпер (+точность)</option>
                        <option value="medic">💉 Медик (лечение)</option>
                        <option value="engineer">🔧 Инженер (+укрепления)</option>
                        <option value="commander">⭐ Командир (+мораль)</option>
                    </select>
                    <input type="text" id="inp-look" placeholder="Внешность" maxlength="50">
                    <button class="btn-primary" id="btn-join" onclick="joinGame()">🪖 НА ФРОНТ</button>
                </div>
            </div>

            <div id="player-bar">
                <span id="unit-flag"></span>
                <b id="disp-name">—</b>
                <span>📍<span id="disp-loc">—</span></span>
                <span>❤️<span id="disp-hp">100</span></span>
                <span id="disp-supplies" style="display:none;">💊<span id="disp-meds">0</span></span>
                <div class="hp-bar-outer"><div class="hp-bar-inner" id="hp-fill" style="width:100%"></div></div>
                <button class="quick-btn order-btn" onclick="getCommanderOrder()">📻</button>
            </div>

            <div id="messages-box"></div>

            <div id="quick-actions">
                <button class="quick-btn" onclick="quickAction('Осматриваю позицию')">🔍</button>
                <button class="quick-btn" onclick="quickAction('Атакую противника')">⚔️</button>
                <button class="quick-btn" onclick="quickAction('Укрепляю позицию')">🛡</button>
                <button class="quick-btn" onclick="quickAction('Провожу разведку')">🔭</button>
                <button class="quick-btn heal-btn" id="btn-heal" onclick="quickAction('Лечу раненого союзника')" style="display:none;">💉</button>
                <button class="quick-btn move-btn" onclick="showMoveMenu()">🚶</button>
                <button class="quick-btn" onclick="quickAction('Захватываю точку')">🏴</button>
                <button class="quick-btn" onclick="quickAction('Отхожу в укрытие')">🏳️</button>
            </div>

            <div id="input-area">
                <input type="text" id="action-input" placeholder="Опиши действие..." disabled>
                <button class="btn-send" id="btn-send" disabled onclick="sendAction()">▶</button>
            </div>
        </div>
    </div>

    <!-- Модалка перемещения -->
    <div id="move-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;">
        <div style="background:#1a1a24;border:1px solid var(--border);border-radius:10px;padding:15px;max-width:350px;width:90%;max-height:70vh;overflow-y:auto;">
            <h3 style="color:var(--gold);margin-bottom:10px;">🚶 Переместиться</h3>
            <div id="move-options"></div>
            <button onclick="document.getElementById('move-modal').style.display='none'" style="margin-top:10px;padding:8px 16px;background:#444;color:#fff;border:none;border-radius:5px;width:100%;">Закрыть</button>
        </div>
    </div>

    <script>
        let player = null;
        let selectedFaction = null;
        let selectedUnit = null;
        let gameState = { locations: {}, players: {}, locationControl: {}, captureProgress: {} };
        const MAX_VISIBLE_MSGS = 50;
        let savedPlayerId = localStorage.getItem('warzone_playerId');

        const UNIT_EMOJI = {
            russia: { somali: '🦂', pyatnashka: '1️⃣5️⃣', sparta: '⚔️', wolves: '🐺' },
            ukraine: { azov: '🔱', aidar: '⚔️', kraken: '🐙', ghost: '💀' }
        };

        const CLASS_BUFFS = {
            rifleman: { name: 'Стрелок', buff: 'survivability', desc: 'Выживаемость +15%' },
            sniper: { name: 'Снайпер', buff: 'accuracy', desc: 'Точность +20%' },
            medic: { name: 'Медик', buff: 'heal', desc: 'Лечение союзников' },
            engineer: { name: 'Инженер', buff: 'sabotage', desc: 'Укрепления +15%' },
            commander: { name: 'Командир', buff: 'morale', desc: 'Мораль +10%' }
        };

        const LOC_COORDS = {
            bakhmut: { x: 390, y: 255, name: 'Бахмут', neighbors: ['soledar','avdeevka','ugledar'] },
            avdeevka: { x: 365, y: 280, name: 'Авдеевка', neighbors: ['bakhmut','donetsk','ugledar'] },
            kherson: { x: 240, y: 335, name: 'Херсон', neighbors: ['zaporozhye'] },
            donetsk: { x: 430, y: 305, name: 'Донецк', neighbors: ['avdeevka','lugansk','mariupol','ugledar'] },
            lugansk: { x: 490, y: 215, name: 'Луганск', neighbors: ['soledar','donetsk'] },
            zaporozhye: { x: 285, y: 285, name: 'Запорожье', neighbors: ['kherson','ugledar'] },
            kharkiv: { x: 435, y: 170, name: 'Харьков', neighbors: ['soledar'] },
            mariupol: { x: 445, y: 350, name: 'Мариуполь', neighbors: ['donetsk'] },
            soledar: { x: 410, y: 235, name: 'Соледар', neighbors: ['bakhmut','kharkiv','lugansk'] },
            ugledar: { x: 405, y: 320, name: 'Угледар', neighbors: ['bakhmut','avdeevka','donetsk','zaporozhye'] }
        };

        function selectFaction(faction) {
            selectedFaction = faction; selectedUnit = null;
            document.querySelectorAll('.faction-card').forEach(c => c.classList.remove('selected'));
            document.querySelector(`[data-faction="${faction}"]`).classList.add('selected');
            const grid = document.getElementById('units-grid');
            grid.style.display = 'grid'; grid.innerHTML = '';
            const units = faction === 'russia' ? ['somali','pyatnashka','sparta','wolves'] : ['azov','aidar','kraken','ghost'];
            const names = { somali:'Сомали', pyatnashka:'Пятнашка', sparta:'Спарта', wolves:'Волки', azov:'Азов', aidar:'Айдар', kraken:'Кракен', ghost:'Призрак' };
            units.forEach(uid => {
                const card = document.createElement('div');
                card.className = 'unit-card';
                card.onclick = () => { selectedUnit = uid; document.querySelectorAll('.unit-card').forEach(c=>c.classList.remove('selected')); card.classList.add('selected'); document.getElementById('char-form').style.display='flex'; };
                card.innerHTML = `<span class="unit-emblem">${UNIT_EMOJI[faction][uid]}</span>${names[uid]}`;
                grid.appendChild(card);
            });
            document.getElementById('char-form').style.display = 'none';
        }

        async function joinGame() {
            const name = document.getElementById('inp-name').value.trim();
            const charClass = document.getElementById('inp-class').value;
            const look = document.getElementById('inp-look').value.trim();
            if (!name || !selectedFaction || !selectedUnit) return;
            document.getElementById('btn-join').disabled = true;
            try {
                const resp = await fetch('/api/join', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, faction: selectedFaction, unitId: selectedUnit, charClass, look })
                });
                const data = await resp.json();
                player = data.player;
                localStorage.setItem('warzone_playerId', player.id);
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('player-bar').classList.add('active');
                document.getElementById('quick-actions').classList.add('active');
                document.getElementById('action-input').disabled = false;
                document.getElementById('btn-send').disabled = false;
                document.getElementById('unit-flag').textContent = data.unit.emblem;
                document.getElementById('disp-name').textContent = player.name;
                if (player.class === 'medic') {
                    document.getElementById('btn-heal').style.display = 'inline-block';
                    document.getElementById('disp-supplies').style.display = 'inline';
                }
                document.getElementById('class-info').textContent = `🎖 ${CLASS_BUFFS[player.class].name}: ${CLASS_BUFFS[player.class].desc}`;
                addMessage('commander', `📻 ${data.unit.commanderName}: ${data.greeting}`);
                updatePlayerUI(); updateMap(); updatePlayersOnLocation();
            } catch (e) { addMessage('system', '❌ Ошибка'); document.getElementById('btn-join').disabled = false; }
        }

        async function sendAction() {
            const input = document.getElementById('action-input');
            const action = input.value.trim();
            if (!action || !player) return;
            addMessage('player', `${player.name}: ${action}`);
            input.value = ''; setInputEnabled(false);
            try {
                const resp = await fetch('/api/action', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ playerId: player.id, action })
                });
                const data = await resp.json();
                if (data.narrative) addMessage('ai', data.narrative);
                if (data.gameUpdate?.systemMessage) {
                    const m = data.gameUpdate.systemMessage;
                    if (m.includes('💀')) addMessage('kill', m);
                    else if (m.includes('захват') || m.includes('контроль') || m.includes('🏴')) addMessage('control', m);
                    else addMessage('system', m);
                }
                if (data.gameUpdate?.playerChanges) {
                    Object.assign(player, data.gameUpdate.playerChanges);
                    if (player.supplies !== undefined) document.getElementById('disp-meds').textContent = player.supplies;
                }
                updatePlayerUI(); updateMap(); updatePlayersOnLocation();
                if (player.hp <= 0) { addMessage('kill', `💀 ${player.name} погиб`); setInputEnabled(false); localStorage.removeItem('warzone_playerId'); }
            } catch (e) { addMessage('system', '⚡ Связь потеряна'); }
            setInputEnabled(true);
        }

        function quickAction(a) { document.getElementById('action-input').value = a; sendAction(); }

        function showMoveMenu() {
            if (!player) return;
            const neighbors = LOC_COORDS[player.location]?.neighbors || [];
            const container = document.getElementById('move-options');
            container.innerHTML = '';
            if (neighbors.length === 0) { container.innerHTML = '<p style="color:#888;">Нет доступных точек.</p>'; }
            neighbors.forEach(locId => {
                const loc = gameState.locationControl?.[locId];
                if (!loc) return;
                const locName = LOC_COORDS[locId]?.name || locId;
                let canMove = false;
                if (player.faction === 'russia' && (loc.control === 'russia' || loc.control === 'contested' || loc.russia >= 30)) canMove = true;
                if (player.faction === 'ukraine' && (loc.control === 'ukraine' || loc.control === 'contested' || loc.ukraine >= 30)) canMove = true;
                const btn = document.createElement('button');
                btn.style.cssText = `width:100%;padding:10px;margin:4px 0;background:${canMove?'#1a3a1a':'#2a1a1a'};border:1px solid ${canMove?'#3a5a3a':'#4a2a2a'};color:${canMove?'#cfc':'#c88'};border-radius:5px;cursor:${canMove?'pointer':'not-allowed'};text-align:left;`;
                btn.innerHTML = `📍 <b>${locName}</b><br><small>РФ:${loc.russia}% / ВСУ:${loc.ukraine}% [${loc.control}]</small>`;
                btn.disabled = !canMove;
                if (canMove) btn.onclick = () => moveToLocation(locId, locName);
                container.appendChild(btn);
            });
            document.getElementById('move-modal').style.display = 'flex';
        }

        async function moveToLocation(locId, locName) {
            if (!player) return;
            try {
                const resp = await fetch('/api/move', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ playerId: player.id, location: locId }) });
                const data = await resp.json();
                if (data.success) {
                    player.location = locId;
                    addMessage('system', `🚶 ${player.name} переместился в ${locName}`);
                    updatePlayerUI(); updateMap(); updatePlayersOnLocation();
                    document.getElementById('move-modal').style.display = 'none';
                } else { addMessage('system', '❌ ' + (data.error || 'Ошибка')); }
            } catch (e) { addMessage('system', '❌ Ошибка'); }
        }

        async function getCommanderOrder() {
            if (!player) return;
            try {
                const resp = await fetch(`/api/commander/${player.id}`);
                const data = await resp.json();
                addMessage('commander', `📻 ${data.commanderName} ${data.unitEmblem}: ${data.order}`);
            } catch (e) {}
        }

        function updatePlayersOnLocation() {
            if (!player) return;
            const locPlayers = Object.values(gameState.players).filter(p => p.alive && p.location === player.location);
            const container = document.getElementById('players-on-location');
            if (locPlayers.length === 0) { container.innerHTML = '<span style="color:#555;">Никого рядом</span>'; }
            else {
                container.innerHTML = `<b style="color:#aaa;">📍 ${LOC_COORDS[player.location]?.name}:</b><br>` +
                    locPlayers.map(p => `${p.faction==='russia'?'🔴':'🔵'} ${p.name} [${p.class}] ${p.hp}HP`).join('<br>');
            }
        }

        function updatePlayerUI() {
            if (!player) return;
            document.getElementById('disp-name').textContent = player.name;
            document.getElementById('disp-hp').textContent = player.hp;
            document.getElementById('disp-loc').textContent = LOC_COORDS[player.location]?.name || '—';
            if (player.supplies !== undefined) document.getElementById('disp-meds').textContent = player.supplies;
            const hpFill = document.getElementById('hp-fill');
            hpFill.style.width = player.hp + '%'; hpFill.className = 'hp-bar-inner';
            if (player.hp <= 20) hpFill.classList.add('critical');
            else if (player.hp <= 40) hpFill.classList.add('low');
        }

        function updateMap() {
            const svg = document.getElementById('map-svg');
            let html = '';
            for (let i = 0; i < 600; i += 40) html += `<line x1="${i}" y1="0" x2="${i}" y2="500" class="map-bg-element"/>`;
            for (let i = 0; i < 500; i += 40) html += `<line x1="0" y1="${i}" x2="600" y2="${i}" class="map-bg-element"/>`;
            Object.entries(LOC_COORDS).forEach(([id, loc]) => {
                loc.neighbors.forEach(nid => {
                    const n = LOC_COORDS[nid];
                    if (n) html += `<line x1="${loc.x}" y1="${loc.y}" x2="${n.x}" y2="${n.y}" stroke="#1a2a1a" stroke-width="1" stroke-dasharray="3 3"/>`;
                });
                const c = gameState.locationControl?.[id] || { russia:50, ukraine:50, control:'contested' };
                let cls = 'contested';
                if (c.control === 'russia' || c.russia >= 65) cls = 'russia';
                else if (c.control === 'ukraine' || c.ukraine >= 65) cls = 'ukraine';
                const isCurrent = player && player.location === id;
                html += `<circle class="loc-point ${cls}${isCurrent?' current':''}" cx="${loc.x}" cy="${loc.y}" r="15" data-loc="${id}" onclick="clickOnMap('${id}')"/>`;
                html += `<text x="${loc.x}" y="${loc.y+3}" class="loc-label">${loc.name.split(' ')[0]}</text>`;
            });
            Object.values(gameState.players).filter(p => p.alive).forEach(p => {
                const loc = LOC_COORDS[p.location]; if (!loc) return;
                html += `<circle cx="${loc.x+Math.sin(p.id.length*2.7)*12}" cy="${loc.y+Math.cos(p.id.length*2.7)*10}" r="4" fill="${p.faction==='russia'?'#ff4444':'#4488ff'}" stroke="white" stroke-width="1" class="player-dot"><title>${p.name} [${p.class}]</title></circle>`;
            });
            svg.innerHTML = html;
            let rus=0,ukr=0,cont=0;
            Object.values(gameState.locationControl||{}).forEach(c=>{if(c.russia>=65)rus++;else if(c.ukraine>=65)ukr++;else cont++;});
            document.getElementById('rus-total').textContent=rus;
            document.getElementById('ukr-total').textContent=ukr;
            document.getElementById('cont-total').textContent=cont;
            document.getElementById('players-online').textContent=Object.values(gameState.players).filter(p=>p.alive).length;
        }

        function clickOnMap(locId) {
            const loc = gameState.locationControl?.[locId];
            const name = LOC_COORDS[locId]?.name || locId;
            if (loc) addMessage('system', `📍 ${name}: РФ ${loc.russia}% / ВСУ ${loc.ukraine}% [${loc.control}]`);
        }

        function addMessage(type, text) {
            const box = document.getElementById('messages-box');
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.textContent = text;
            box.appendChild(div);
            const allMsgs = box.querySelectorAll('.msg');
            if (allMsgs.length > MAX_VISIBLE_MSGS)
                for (let i = 0; i < allMsgs.length - MAX_VISIBLE_MSGS; i++) allMsgs[i].classList.add('old');
            box.scrollTop = box.scrollHeight;
        }

        function setInputEnabled(e) {
            document.getElementById('action-input').disabled = !e;
            document.getElementById('btn-send').disabled = !e;
        }

        document.getElementById('action-input').addEventListener('keypress', e => { if (e.key==='Enter') sendAction(); });

        async function pollState() {
            try {
                const resp = await fetch('/api/state');
                const data = await resp.json();
                gameState = data;
                updateMap();
                updatePlayersOnLocation();

                // Восстановление сохранённого игрока
                if (!player && savedPlayerId && data.players[savedPlayerId] && data.players[savedPlayerId].alive) {
                    player = data.players[savedPlayerId];
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('player-bar').classList.add('active');
                    document.getElementById('quick-actions').classList.add('active');
                    document.getElementById('action-input').disabled = false;
                    document.getElementById('btn-send').disabled = false;
                    document.getElementById('unit-flag').textContent = UNIT_EMOJI[player.faction]?.[player.unit] || '';
                    document.getElementById('disp-name').textContent = player.name;
                    if (player.class === 'medic') {
                        document.getElementById('btn-heal').style.display = 'inline-block';
                        document.getElementById('disp-supplies').style.display = 'inline';
                    }
                    document.getElementById('class-info').textContent = `🎖 ${CLASS_BUFFS[player.class].name}: ${CLASS_BUFFS[player.class].desc}`;
                    updatePlayerUI();
                    updateMap();
                    updatePlayersOnLocation();
                    addMessage('system', `👋 С возвращением, ${player.name}!`);
                }

                if (player && data.players[player.id]) {
                    const sp = data.players[player.id];
                    if (sp.hp !== player.hp || sp.supplies !== player.supplies) {
                        player.hp = sp.hp; player.supplies = sp.supplies; updatePlayerUI();
                    }
                    if (!sp.alive && player.alive) {
                                                player.alive = false; addMessage('kill', '💀 Ты погиб'); 
                        setInputEnabled(false); localStorage.removeItem('warzone_playerId');
                    }
                }
            } catch (e) {}
        }
        setInterval(pollState, 8000);

        document.getElementById('move-modal').addEventListener('click', function(e) {
            if (e.target === this) this.style.display = 'none';
        });

        addMessage('system', '⚔️ WarZone RP готова. Выбери сторону!');
        pollState();
    </script>
</body>
</html>
