<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>WarZone: Ukraine Conflict RP</title>
    <style>
        :root {
            --bg: #08080c; --panel: #0e0e16; --border: #1e1e2a; --text: #c0c0cc;
            --gold: #c8a840; --rus-red: #b82828; --ukr-blue: #2860b8; --orange: #c87028;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; height: 100dvh; overflow: hidden; touch-action: manipulation; }

        #news-ticker {
            position: fixed; top: 0; left: 0; right: 0; z-index: 3000;
            background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--border);
            padding: 4px 0; overflow: hidden; white-space: nowrap; font-size: 0.7rem; color: #ddd; height: 22px;
        }
        #news-ticker span { display: inline-block; padding-left: 100%; animation: ticker 60s linear infinite; }
        @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-100%)} }

        #app { display: grid; grid-template-columns: 1fr 1.2fr; height: calc(100vh - 22px); margin-top: 22px; }

        #map-panel { position: relative; overflow: hidden; border-right: 2px solid var(--border); background: #0d1a0d; }
        #map-svg { width: 100%; height: 100%; transition: transform 0.1s; transform-origin: center; }
        .map-bg-element { stroke: #1a3a1a; stroke-width: 0.5; fill: none; }
        .loc-point { cursor: pointer; transition: all 0.3s; filter: drop-shadow(0 0 4px rgba(0,0,0,0.8)); }
        .loc-point.russia { fill: rgba(200,30,30,0.85); stroke: #ff6666; stroke-width: 2; }
        .loc-point.ukraine { fill: rgba(30,70,200,0.85); stroke: #6688ff; stroke-width: 2; }
        .loc-point.contested { fill: rgba(255,130,0,0.8); stroke: #ffaa44; stroke-width: 2; animation: pulse 2s infinite; }
        .loc-point.current { stroke: #fff !important; stroke-width: 4 !important; stroke-dasharray: 4 2; animation: dashMove 1s linear infinite; }
        @keyframes pulse { 0%,100%{r:15} 50%{r:20} } @keyframes dashMove { to{stroke-dashoffset:-12} }
        .loc-label { fill: #fff; font-size: 8px; font-weight: bold; text-anchor: middle; pointer-events: none; paint-order: stroke; stroke: #000; stroke-width: 3px; }
        .building-icon { font-size: 10px; pointer-events: none; }
        .player-dot { transition: all 0.5s; pointer-events: none; }
        #map-legend { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,0.9); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; font-size: 0.65rem; z-index: 10; min-width: 140px; max-height: 45vh; overflow-y: auto; }
        #map-legend h4 { color: var(--gold); margin-bottom: 4px; font-size: 0.7rem; }
        .legend-row { display: flex; align-items: center; gap: 4px; margin: 2px 0; }
        .legend-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
        .legend-dot.russia { background: var(--rus-red); } .legend-dot.ukraine { background: var(--ukr-blue); } .legend-dot.contested { background: var(--orange); }
        #players-on-location { margin-top: 4px; font-size: 0.6rem; color: #aaa; max-height: 50px; overflow-y: auto; }
        #class-info { margin-top: 3px; font-size: 0.55rem; color: var(--gold); }

        #chat-panel { display: flex; flex-direction: column; background: var(--panel); height: 100%; overflow: hidden; }
        #auth-screen { padding: 10px; border-bottom: 2px solid var(--border); background: #101018; overflow-y: auto; flex-shrink: 0; }
        #auth-screen.hidden { display: none; }
        #auth-screen h2 { text-align: center; color: var(--gold); font-size: 0.9rem; margin-bottom: 4px; }
        .faction-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 4px; }
        .faction-card { padding: 7px; border: 2px solid #222; border-radius: 5px; cursor: pointer; text-align: center; font-weight: bold; font-size: 0.75rem; background: transparent; color: #fff; }
        .faction-card.russia-card { border-color: #4a1a1a; } .faction-card.russia-card.selected { background: #2a1018; border-color: var(--rus-red); }
        .faction-card.ukraine-card { border-color: #1a2a4a; } .faction-card.ukraine-card.selected { background: #101c3a; border-color: var(--ukr-blue); }
        .units-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 3px; margin-bottom: 4px; }
        .unit-card { padding: 5px; border: 2px solid #2a2a2a; border-radius: 4px; cursor: pointer; text-align: center; background: #14141c; font-size: 0.65rem; }
        .unit-card.selected { border-color: var(--gold); background: #1a1a28; } .unit-card .unit-emblem { font-size: 1.2rem; display: block; }
        #char-form { display: flex; flex-direction: column; gap: 4px; }
        #char-form input, #char-form select { padding: 5px; background: #1a1a24; border: 1px solid #333; color: #fff; border-radius: 4px; font-size: 0.7rem; }
        .btn-primary { padding: 7px; background: var(--gold); color: #000; border: none; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 0.75rem; }
        .btn-primary:disabled { background: #444; color: #888; }
        .btn-respawn { padding: 7px; background: #4a2020; color: #faa; border: 2px solid #8b0000; font-weight: bold; border-radius: 5px; cursor: pointer; font-size: 0.75rem; margin-top: 4px; display: none; }

        #player-bar { display: none; padding: 4px 7px; background: #0c0c16; border-bottom: 1px solid var(--border); font-size: 0.62rem; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 2px; flex-shrink: 0; }
        #player-bar.active { display: flex; }
        #disp-name { cursor: pointer; text-decoration: underline; }
        .hp-bar-outer { width: 45px; height: 3px; background: #222; border-radius: 2px; overflow: hidden; }
        .hp-bar-inner { height: 100%; background: #4a4; transition: width 0.4s; }
        .hp-bar-inner.low { background: #a44; } .hp-bar-inner.critical { background: #a22; animation: blink 0.5s infinite; }
        @keyframes blink { 50%{opacity:0.3} }

        #tab-bar { display: none; padding: 2px 5px; gap: 2px; background: #0a0a12; border-bottom: 1px solid var(--border); }
        #tab-bar.active { display: flex; }
        .tab-btn { padding: 3px 7px; background: #1a1a28; border: 1px solid #333; color: #888; border-radius: 7px; font-size: 0.6rem; cursor: pointer; }
        .tab-btn.active { background: #2a2a38; color: #fff; border-color: var(--gold); }

        /* ФИКС ЧАТА */
        #chat-container { flex: 1; position: relative; overflow: hidden; }
        #messages-box { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow-y: auto; padding: 5px; display: flex; flex-direction: column; gap: 3px; -webkit-overflow-scrolling: touch; }
        #faction-chat-box { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow-y: auto; padding: 5px; display: none; flex-direction: column; gap: 2px; -webkit-overflow-scrolling: touch; }
        #faction-chat-box.active { display: flex; }
        #messages-box.hidden { display: none; }

        .msg { padding: 4px 7px; border-radius: 4px; max-width: 85%; font-size: 0.65rem; line-height: 1.25; animation: msgIn 0.2s; }
        @keyframes msgIn { from{opacity:0;transform:translateY(3px)} to{opacity:1;transform:translateY(0)} }
        .msg.ai { background: #141420; border-left: 2px solid var(--gold); align-self: flex-start; }
        .msg.commander { background: #1a1420; border-left: 2px solid #a040d0; align-self: flex-start; color: #d0c0e0; }
        .msg.player { background: #141c14; border-right: 2px solid #4a7a4a; align-self: flex-end; color: #b8c8b8; }
        .msg.system { background: #181818; color: #777; align-self: center; font-style: italic; font-size: 0.58rem; text-align: center; }
        .msg.kill { background: #1a1010; border: 1px solid #4a2020; color: #d08080; align-self: center; text-align: center; }
        .msg.control { background: #101a10; border: 1px solid #2a4a2a; color: #80c080; align-self: center; text-align: center; }
        .msg.faction { background: #1a1a20; border-left: 2px solid #6666aa; align-self: flex-start; font-size: 0.6rem; }
        .msg.old { opacity: 0.3; }

        #input-area { padding: 5px; border-top: 2px solid var(--border); display: flex; gap: 4px; background: #0e0e16; flex-shrink: 0; }
        #action-input { flex: 1; padding: 6px 9px; background: #1a1a24; border: 1px solid #333; color: #fff; border-radius: 14px; font-size: 0.65rem; }
        #action-input:disabled { opacity: 0.4; }
        #faction-input { flex: 1; padding: 6px 9px; background: #1a1a24; border: 1px solid #333; color: #fff; border-radius: 14px; font-size: 0.65rem; display: none; }
        #faction-input.active { display: block; }
        #action-input.hidden { display: none; }
        .btn-send { width: 30px; height: 30px; border-radius: 50%; background: var(--gold); color: #000; border: none; font-size: 0.8rem; cursor: pointer; flex-shrink: 0; }
        .btn-send:disabled { background: #333; color: #666; }

        #quick-actions { display: none; padding: 3px 5px; gap: 2px; flex-wrap: wrap; border-top: 1px solid var(--border); background: #0a0a12; flex-shrink: 0; }
        #quick-actions.active { display: flex; }
        .quick-btn { padding: 3px 6px; background: #1a1a28; border: 1px solid #333; color: #bbb; border-radius: 8px; font-size: 0.58rem; cursor: pointer; }
        .quick-btn.move-btn { border-color: #2a4a2a; color: #8c8; }
        .quick-btn.heal-btn { border-color: #2a3a4a; color: #8ac; }

        #music-btn { position: fixed; bottom: 65px; right: 10px; z-index: 500; width: 34px; height: 34px; border-radius: 50%; background: rgba(0,0,0,0.85); border: 1px solid var(--border); color: #fff; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

        /* Всплывающее событие */
        #event-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2500; display: none; text-align: center;
            background: rgba(0,0,0,0.95); border: 2px solid var(--gold);
            border-radius: 16px; padding: 24px; max-width: 380px; width: 90%;
            box-shadow: 0 0 60px rgba(200,168,64,0.5); animation: popIn 0.5s ease;
        }
        @keyframes popIn { 0%{transform:translate(-50%,-50%) scale(0.5);opacity:0} 100%{transform:translate(-50%,-50%) scale(1);opacity:1} }
        #event-emoji { font-size: 3.5rem; margin-bottom: 8px; }
        #event-title { color: var(--gold); font-size: 1.1rem; font-weight: bold; margin-bottom: 6px; }
        #event-text { color: #ccc; font-size: 0.8rem; margin-bottom: 14px; }
        #event-close { padding: 8px 24px; background: var(--gold); color: #000; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

        /* Инвентарь */
        #inventory-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 2100; background: #12121c; border: 2px solid var(--gold); border-radius: 12px;
            padding: 16px; max-width: 450px; width: 95%; box-shadow: 0 0 40px rgba(0,0,0,0.9);
        }
        #inventory-modal h3 { color: var(--gold); text-align: center; margin-bottom: 10px; font-size: 0.9rem; }
        .inv-layout { display: flex; gap: 10px; }
        .inv-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; flex: 1; }
        .inv-slot { aspect-ratio: 1; background: #1a1a28; border: 1px solid #333; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; cursor: pointer; position: relative; transition: all 0.2s; }
        .inv-slot:hover { border-color: var(--gold); background: #222238; }
        .inv-slot .item-count { position: absolute; bottom: 2px; right: 4px; font-size: 0.55rem; color: #fff; }
        .inv-equipment { display: flex; flex-direction: column; gap: 4px; width: 60px; }
        .inv-equip-slot { aspect-ratio: 1; background: #1a1a28; border: 2px solid #2a2a3a; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; cursor: pointer; transition: all 0.2s; }
        .inv-equip-slot:hover { border-color: var(--gold); }
        .inv-equip-slot.equipped { border-color: #4a4 !important; box-shadow: 0 0 8px rgba(100,200,100,0.4); }
        .inv-mannequin { text-align: center; font-size: 0.5rem; color: #888; line-height: 1; }
        .inv-mannequin span { font-size: 1.8rem; display: block; }

        @media (max-width: 768px) {
            #app { grid-template-columns: 1fr; grid-template-rows: 35vh 1fr; }
            #map-panel { border-right: none; border-bottom: 2px solid var(--border); }
            #inventory-modal { max-width: 95%; padding: 10px; }
        }
    </style>
</head>
<body>
    <div id="news-ticker"><span id="news-text">⚔️ Загрузка сводок...</span></div>

    <div id="event-popup">
        <div id="event-emoji">🏴</div>
        <div id="event-title"></div>
        <div id="event-text"></div>
        <button id="event-close" onclick="closeEvent()">Понятно</button>
    </div>

    <div id="app">
        <div id="map-panel">
            <svg id="map-svg" viewBox="0 0 600 500"></svg>
            <div id="map-legend">
                <h4>📍 КАРТА</h4>
                <div class="legend-row"><span class="legend-dot russia"></span> РФ: <b id="rus-total">0</b></div>
                <div class="legend-row"><span class="legend-dot ukraine"></span> ВСУ: <b id="ukr-total">0</b></div>
                <div class="legend-row"><span class="legend-dot contested"></span> Бои: <b id="cont-total">0</b></div>
                <div style="margin-top:3px;font-size:0.55rem;">👥 <b id="players-online">0</b></div>
                <div id="players-on-location"></div>
                <div id="class-info"></div>
                <button class="btn-respawn" id="btn-respawn" onclick="respawnPlayer()">🔄 Новый боец</button>
            </div>
        </div>

        <div id="chat-panel">
            <div id="auth-screen">
                <h2>⚔️ WARZONE RP</h2>
                <div class="faction-grid">
                    <button class="faction-card russia-card" onclick="selectFaction('russia')">🇷🇺 ВС РФ</button>
                    <button class="faction-card ukraine-card" onclick="selectFaction('ukraine')">🇺🇦 ВСУ</button>
                </div>
                <div class="units-grid" id="units-grid" style="display:none;"></div>
                <div id="char-form" style="display:none;">
                    <input type="text" id="inp-name" placeholder="Позывной" maxlength="20">
                    <select id="inp-class">
                        <option value="rifleman">🔫 Стрелок</option><option value="sniper">🎯 Снайпер</option>
                        <option value="medic">💉 Медик</option><option value="engineer">🔧 Инженер</option>
                        <option value="commander">⭐ Командир</option>
                    </select>
                    <input type="text" id="inp-look" placeholder="Внешность" maxlength="50">
                    <button class="btn-primary" id="btn-join" onclick="joinGame()">🪖 НА ФРОНТ</button>
                </div>
            </div>

            <div id="player-bar">
                <span id="unit-flag"></span>
                <b id="disp-name" onclick="showProfile()">—</b>
                <span id="disp-rank">Ряд.</span>
                <span>📍<span id="disp-loc">—</span></span>
                <span>❤️<span id="disp-hp">100</span></span>
                <span id="disp-supplies" style="display:none;">💊<span id="disp-meds">0</span></span>
                <div class="hp-bar-outer"><div class="hp-bar-inner" id="hp-fill" style="width:100%"></div></div>
                <button class="quick-btn" onclick="getCommanderOrder()">📻</button>
            </div>

            <div id="tab-bar">
                <button class="tab-btn active" onclick="switchTab('game')">⚔️ Бой</button>
                <button class="tab-btn" onclick="switchTab('faction')">💬 Фракция</button>
            </div>

            <div id="chat-container">
                <div id="messages-box"></div>
                <div id="faction-chat-box"></div>
            </div>

            <div id="quick-actions">
                <button class="quick-btn" onclick="quickAction('Осматриваю позицию')">🔍</button>
                <button class="quick-btn" onclick="quickAction('Атакую противника')">⚔️</button>
                <button class="quick-btn" onclick="quickAction('Укрепляю позицию')">🛡</button>
                <button class="quick-btn" onclick="quickAction('Провожу разведку')">🔭</button>
                <button class="quick-btn heal-btn" id="btn-heal" onclick="quickAction('Лечу раненого')" style="display:none;">💉</button>
                <button class="quick-btn move-btn" onclick="showMoveMenu()">🚶</button>
                <button class="quick-btn" onclick="quickAction('Захватываю точку')">🏴</button>
                <button class="quick-btn" onclick="quickAction('Отхожу')">🏳️</button>
            </div>

            <div id="input-area">
                <input type="text" id="action-input" placeholder="Действие..." disabled>
                <input type="text" id="faction-input" placeholder="Фракции...">
                <button class="btn-send" id="btn-send" disabled onclick="sendAction()">▶</button>
            </div>
        </div>
    </div>

    <!-- Модалка профиля -->
    <div id="profile-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:2000;align-items:center;justify-content:center;">
        <div style="background:#1a1a24;border:1px solid #333;border-radius:12px;padding:20px;max-width:320px;width:90%;text-align:center;">
            <div id="profile-avatar" style="width:70px;height:70px;border-radius:50%;background:#222;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:35px;cursor:pointer;overflow:hidden;border:2px solid var(--gold);">
                <span id="profile-avatar-text">🪖</span>
                <img id="profile-avatar-img" style="display:none;width:100%;height:100%;object-fit:cover;">
            </div>
            <input type="file" id="avatar-upload" accept="image/*" style="display:none;">
            <p style="font-size:0.55rem;color:#888;margin-bottom:6px;">Нажми на иконку для аватара</p>
            <h3 id="profile-name" style="color:var(--gold);margin-bottom:3px;">—</h3>
            <p id="profile-rank" style="color:#aaa;margin-bottom:2px;font-size:0.75rem;">—</p>
            <p id="profile-class" style="color:#ccc;margin-bottom:2px;font-size:0.75rem;">—</p>
            <p id="profile-unit" style="color:#ccc;margin-bottom:2px;font-size:0.75rem;">—</p>
            <p id="profile-hp" style="color:#4a4;margin-bottom:2px;font-size:0.75rem;">—</p>
            <p id="profile-kills" style="color:#c44;margin-bottom:2px;font-size:0.75rem;">—</p>
            <p id="profile-deaths" style="color:#888;margin-bottom:8px;font-size:0.75rem;">—</p>
            <button onclick="showInventory()" style="padding:7px 14px;background:#2a3a4a;color:#8ac;border:1px solid #4a6a8a;border-radius:5px;cursor:pointer;font-size:0.75rem;margin-right:6px;">🎒 Инвентарь</button>
            <button onclick="document.getElementById('profile-modal').style.display='none'" style="padding:7px 14px;background:var(--gold);color:#000;border:none;border-radius:5px;cursor:pointer;font-weight:bold;font-size:0.75rem;">Закрыть</button>
        </div>
    </div>

    <!-- Модалка инвентаря -->
    <div id="inventory-modal">
        <h3>🎒 Инвентарь</h3>
        <div class="inv-layout">
            <div class="inv-grid" id="inv-grid"></div>
            <div class="inv-equipment">
                <div class="inv-equip-slot" id="equip-helmet" title="Шлем" onclick="unequipItem('helmet')">🪖</div>
                <div class="inv-equip-slot" id="equip-weapon" title="Оружие" onclick="unequipItem('weapon')">🔫</div>
                <div class="inv-equip-slot" id="equip-armor" title="Бронежилет" onclick="unequipItem('armor')">🛡️</div>
                <div class="inv-equip-slot" id="equip-boots" title="Ботинки" onclick="unequipItem('boots')">👢</div>
            </div>
            <div class="inv-mannequin">
                <span>🪖</span>шлем
                <span>🔫</span>оружие
                <span>🛡️</span>броня
                <span>👢</span>обувь
            </div>
        </div>
        <button onclick="document.getElementById('inventory-modal').style.display='none'" style="margin-top:10px;padding:7px 20px;background:var(--gold);color:#000;border:none;border-radius:5px;cursor:pointer;width:100%;font-weight:bold;">Закрыть</button>
    </div>

    <div id="move-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);z-index:1000;align-items:center;justify-content:center;">
        <div style="background:#1a1a24;border:1px solid #333;border-radius:10px;padding:15px;max-width:350px;width:90%;max-height:70vh;overflow-y:auto;">
            <h3 style="color:var(--gold);margin-bottom:10px;">🚶 Переместиться</h3>
            <div id="move-options"></div>
            <button onclick="document.getElementById('move-modal').style.display='none'" style="margin-top:10px;padding:8px 16px;background:#444;color:#fff;border:none;border-radius:5px;width:100%;">Закрыть</button>
        </div>
    </div>

    <button id="music-btn" onclick="toggleMusic()">🔇</button>
    <audio id="bg-music" loop style="display:none;" preload="auto">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        let player = null, selectedFaction = null, selectedUnit = null;
        let gameState = { locations: {}, players: {}, locationControl: {} };
        const MAX_VISIBLE_MSGS = 50;
        let savedPlayerId = localStorage.getItem('warzone_playerId');
        let currentTab = 'game', musicPlaying = false;
        let prevControl = {};

        const UNIT_EMOJI = {
            russia: { somali: '🦂', pyatnashka: '1️⃣5️⃣', sparta: '⚔️', wolves: '🐺' },
            ukraine: { azov: '🔱', aidar: '⚔️', kraken: '🐙', ghost: '💀' }
        };
        const CLASS_BUFFS = {
            rifleman: { name: 'Стрелок', buff: 'survivability', desc: 'Выживаемость +15%' },
            sniper: { name: 'Снайпер', buff: 'accuracy', desc: 'Точность +20%' },

        // Инвентарь игрока (локально)
        let playerInventory = { items: [], equipment: { helmet: null, weapon: null, armor: null, boots: null } };

        function initInventory() {
            const saved = localStorage.getItem('warzone_inv_' + (player?.id || ''));
            if (saved) playerInventory = JSON.parse(saved);
            else playerInventory = { items: Array(16).fill(null), equipment: { helmet: null, weapon: null, armor: null, boots: null } };
        }

        function saveInventory() {
            if (player) localStorage.setItem('warzone_inv_' + player.id, JSON.stringify(playerInventory));
        }

        function renderInventory() {
            const grid = document.getElementById('inv-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 16; i++) {
                const item = playerInventory.items[i];
                const slot = document.createElement('div');
                slot.className = 'inv-slot';
                slot.innerHTML = item ? item.emoji + '<span class="item-count">' + (item.count||1) + '</span>' : '';
                slot.onclick = () => useInventoryItem(i);
                grid.appendChild(slot);
            }
            // Экипировка
            ['helmet','weapon','armor','boots'].forEach(slot => {
                const el = document.getElementById('equip-' + slot);
                const item = playerInventory.equipment[slot];
                if (item) { el.textContent = item.emoji; el.classList.add('equipped'); }
                else { el.textContent = slot === 'helmet' ? '🪖' : slot === 'weapon' ? '🔫' : slot === 'armor' ? '🛡️' : '👢'; el.classList.remove('equipped'); }
            });
        }

        function useInventoryItem(index) {
            const item = playerInventory.items[index];
            if (!item) return;
            // Экипировать в соответствующий слот
            if (item.slot) {
                const old = playerInventory.equipment[item.slot];
                playerInventory.equipment[item.slot] = item;
                playerInventory.items[index] = old;
            }
            saveInventory();
            renderInventory();
            addMessage('system', '🎒 ' + (item.name || 'Предмет') + ' экипирован!');
        }

        function unequipItem(slot) {
            const item = playerInventory.equipment[slot];
            if (!item) return;
            // Найти свободное место
            const freeSlot = playerInventory.items.findIndex(i => i === null);
            if (freeSlot >= 0) {
                playerInventory.items[freeSlot] = item;
                playerInventory.equipment[slot] = null;
                saveInventory();
                renderInventory();
                addMessage('system', '🎒 Предмет снят.');
            }
        }

        function addItemToInventory(emoji, name, slot, count = 1) {
            initInventory();
            const existing = playerInventory.items.findIndex(i => i && i.name === name && !i.slot);
            if (existing >= 0 && count === 1) {
                playerInventory.items[existing].count = (playerInventory.items[existing].count || 1) + 1;
            } else {
                const freeSlot = playerInventory.items.findIndex(i => i === null);
                if (freeSlot >= 0) {
                    playerInventory.items[freeSlot] = { emoji, name, slot, count };
                }
            }
            saveInventory();
        }

        function showInventory() {
            document.getElementById('profile-modal').style.display = 'none';
            initInventory();
            renderInventory();
            document.getElementById('inventory-modal').style.display = 'block';
        }

            units.forEach(uid => {

                card.onclick = () => { selectedUnit = uid; document.querySelectorAll('.unit-card').forEach(c=>c.classList.remove('selected')); card.classList.add('selected'); document.getElementById('char-form').style.display='flex'; };

            document.getElementById('faction-chat-box').classList.toggle('active', tab === 'faction');
            document.getElementById('action-input').classList.toggle('hidden', tab !== 'game');

        async function joinGame() {
            const name = document.getElementById('inp-name').value.trim();
            const charClass = document.getElementById('inp-class').value;
            const look = document.getElementById('inp-look').value.trim();
            if (!name || !selectedFaction || !selectedUnit) return;
            document.getElementById('btn-join').disabled = true;
            try {
                const resp = await fetch('/api/join', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, faction: selectedFaction, unitId: selectedUnit, charClass, look }) });
                const data = await resp.json();
                player = data.player;
                localStorage.setItem('warzone_playerId', player.id);
                initInventory();
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('player-bar').classList.add('active');
                document.getElementById('tab-bar').classList.add('active');
                document.getElementById('quick-actions').classList.add('active');
                document.getElementById('action-input').disabled = false;
                document.getElementById('btn-send').disabled = false;
                document.getElementById('unit-flag').textContent = data.unit.emblem;
                document.getElementById('disp-name').textContent = player.name;
                document.getElementById('btn-respawn').style.display = 'none';

                document.getElementById('class-info').textContent = '🎖 ' + CLASS_BUFFS[player.class].name;
                addMessage('commander', '📻 ' + data.unit.commanderName + ': ' + data.greeting);
                updatePlayerUI(); updateMap(); updatePlayersOnLocation();
            } catch (e) { addMessage('system', '❌ Ошибка'); document.getElementById('btn-join').disabled = false; }

        async function respawnPlayer() {
            if (!player) return;
            const name = prompt('Позывной:', player.name);
            if (!name) return;
            try {
                const resp = await fetch('/api/respawn', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ playerId: player.id, name, faction: player.faction, unitId: player.unit, charClass: player.class, look: player.look }) });
                const data = await resp.json();
                player = data.player;
                localStorage.setItem('warzone_playerId', player.id);
                playerInventory = { items: Array(16).fill(null), equipment: { helmet: null, weapon: null, armor: null, boots: null } };
                saveInventory();
                document.getElementById('btn-respawn').style.display = 'none';

                document.getElementById('btn-send').disabled = false;
                document.getElementById('disp-name').textContent = player.name;
                document.getElementById('quick-actions').classList.add('active');
                addMessage('system', data.message);
                updatePlayerUI(); updateMap(); updatePlayersOnLocation();

        async function sendAction() {
            if (currentTab !== 'game') return;
            const input = document.getElementById('action-input');
            const action = input.value.trim();
            if (!action || !player) return;
            addMessage('player', player.name + ': ' + action);
            input.value = ''; setInputEnabled(false);
            try {
                const resp = await fetch('/api/action', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ playerId: player.id, action }) });
                const data = await resp.json();
                if (data.narrative) addMessage('ai', data.narrative);
                if (data.gameUpdate?.systemMessage) {
                    const m = data.gameUpdate.systemMessage;
                    if (m.includes('💀')) addMessage('kill', m);
                    else if (m.includes('захват') || m.includes('🏴')) addMessage('control', m);
                    else addMessage('system', m);
                }
                if (data.gameUpdate?.playerChanges) {
                    const oldRank = player.rank;
                    Object.assign(player, data.gameUpdate.playerChanges);
                    if (player.supplies !== undefined) document.getElementById('disp-meds').textContent = player.supplies;
                    if (player.alive === false) handleDeath();
                    // Шанс получить ящик при повышении ранга
                    if (player.rank !== oldRank && player.rank !== 'Рядовой') {
                        const loot = getRandomLoot();
                        addItemToInventory(loot.emoji, loot.name, loot.slot);
                        addMessage('system', '📦 Повышение! Получен предмет: ' + loot.name);
                    }
                }
                updatePlayerUI(); updateMap(); updatePlayersOnLocation();
            } catch (e) { addMessage('system', '⚡ Связь потеряна'); }
            setInputEnabled(true);
        }

        function getRandomLoot() {
            const loots = [
                { emoji: '⛑️', name: 'Каска', slot: 'helmet' },
                { emoji: '🎖️', name: 'Бронежилет', slot: 'armor' },
                { emoji: '🔫', name: 'Автомат АК', slot: 'weapon' },
                { emoji: '👢', name: 'Берцы', slot: 'boots' },
                { emoji: '💣', name: 'Граната', slot: null },
                { emoji: '🩹', name: 'Аптечка', slot: null },
            ];
            return loots[Math.floor(Math.random() * loots.length)];
        }

            document.getElementById('btn-respawn').style.display = 'block';

            document.getElementById('quick-actions').classList.remove('active');

        function showMoveMenu() {
            if (!player) return;
            const neighbors = LOC_COORDS[player.location]?.neighbors || [];
            const container = document.getElementById('move-options');
            container.innerHTML = '';
            if (!neighbors.length) { container.innerHTML = '<p style="color:#888;">Нет точек.</p>'; }
            neighbors.forEach(locId => {
                const loc = gameState.locationControl?.[locId]; if (!loc) return;
                const locName = LOC_COORDS[locId]?.name || locId;
                const myPower = player.faction === 'russia' ? loc.russia : loc.ukraine;
                const enemyPower = player.faction === 'russia' ? loc.ukraine : loc.russia;
                let canMove = enemyPower <= 70;
                let riskColor = canMove ? (myPower >= 65 ? '#8c8' : '#cc8') : '#c44';
                let riskText = !canMove ? '🚫 Враг >70%' : (myPower >= 65 ? '✅ Безопасно' : '⚠️ Опасно');
                const btn = document.createElement('button');
                btn.style.cssText = 'width:100%;padding:10px;margin:4px 0;background:#1a1a24;border:2px solid ' + riskColor + ';color:' + (canMove?'#fff':'#888') + ';border-radius:5px;cursor:' + (canMove?'pointer':'not-allowed') + ';text-align:left;';
                btn.innerHTML = '📍 <b>' + locName + '</b><br><small>РФ:' + loc.russia + '% / ВСУ:' + loc.ukraine + '%</small><br><small style="color:' + riskColor + ';">' + riskText + '</small>';
                btn.disabled = !canMove;
                if (canMove) btn.onclick = () => moveToLocation(locId, locName);
                container.appendChild(btn);
            });
            document.getElementById('move-modal').style.display = 'flex';
        }

        async function moveToLocation(locId, locName) {
            if (!player) return;
            try {
                const resp = await fetch('/api/move', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ playerId: player.id, location: locId }) });
                const data = await resp.json();
                if (data.success) {
                    player.location = locId;
                    addMessage('system', '🚶 ' + data.message);
                    updatePlayerUI(); updateMap(); updatePlayersOnLocation();
                    document.getElementById('move-modal').style.display = 'none';
                } else {
                    addMessage('system', '❌ ' + (data.error || 'Ошибка'));
                    if (data.error && data.error.includes('💀')) handleDeath();
                }
            } catch (e) { addMessage('system', '❌ Ошибка'); }
        }

        let mapZoom = 1, mapPanX = 0, mapPanY = 0;
        const mapSvg = document.getElementById('map-svg'), mapPanel = document.getElementById('map-panel');
        mapPanel.addEventListener('wheel', function(e) { e.preventDefault(); mapZoom = Math.min(2.5, Math.max(0.5, mapZoom + (e.deltaY>0?-0.1:0.1))); mapSvg.style.transform = 'translate('+mapPanX+'px,'+mapPanY+'px) scale('+mapZoom+')'; });
        let tsx, tsy, lpd, isPanning = false;
        mapPanel.addEventListener('touchstart', function(e) { if(e.touches.length===2){lpd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);return;} tsx=e.touches[0].clientX; tsy=e.touches[0].clientY; isPanning=true; });
        mapPanel.addEventListener('touchmove', function(e) {
            if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY); mapZoom=Math.min(2.5,Math.max(0.5,mapZoom+(d-lpd)*0.005)); lpd=d; mapSvg.style.transform='translate('+mapPanX+'px,'+mapPanY+'px) scale('+mapZoom+')'; return;}
            if(!isPanning||e.touches.length!==1)return; mapPanX+=e.touches[0].clientX-tsx; mapPanY+=e.touches[0].clientY-tsy; tsx=e.touches[0].clientX; tsy=e.touches[0].clientY; mapSvg.style.transform='translate('+mapPanX+'px,'+mapPanY+'px) scale('+mapZoom+')';
        });
        mapPanel.addEventListener('dblclick', function() { mapZoom=1; mapPanX=0; mapPanY=0; mapSvg.style.transform=''; });

        async function updateNewsTicker() {

                const name = LOC_COORDS[locId]?.name || locId;
                if (c.russia >= 65) items.push(name + ': ВС РФ');

        function updatePlayersOnLocation() {

            const locPlayers = Object.values(gameState.players).filter(p => p.alive && p.location === player.location);
            const loc = gameState.locations[player.location];
            let bt = loc?.buildings?.length ? '<br>🏗 ' + loc.buildings.map(b=>BUILDING_EMOJI[b]||b).join(' ') : '';

        function updatePlayerUI() {
            if (!player) return;
            document.getElementById('disp-name').textContent = player.name;
            document.getElementById('disp-hp').textContent = player.hp;
            document.getElementById('disp-rank').textContent = (player.rank||'Ряд.').substring(0,4);
            document.getElementById('disp-loc').textContent = LOC_COORDS[player.location]?.name || '—';
            if (player.supplies !== undefined) document.getElementById('disp-meds').textContent = player.supplies;
            const pct = ((player.hp||0)/(player.maxHp||100))*100;
            const hpFill = document.getElementById('hp-fill');
            hpFill.style.width = pct + '%';
            hpFill.className = 'hp-bar-inner' + (pct<=20?' critical':pct<=40?' low':'');

        function updateMap() {
            const svg = document.getElementById('map-svg');
            let html = '';
            for (let i=0;i<600;i+=40) html += '<line x1="'+i+'" y1="0" x2="'+i+'" y2="500" class="map-bg-element"/>';
            for (let i=0;i<500;i+=40) html += '<line x1="0" y1="'+i+'" x2="600" y2="'+i+'" class="map-bg-element"/>';
            Object.entries(LOC_COORDS).forEach(([id, loc]) => {
                loc.neighbors.forEach(nid => { const n=LOC_COORDS[nid]; if(n) html += '<line x1="'+loc.x+'" y1="'+loc.y+'" x2="'+n.x+'" y2="'+n.y+'" stroke="#1a2a1a" stroke-width="1" stroke-dasharray="3 3"/>'; });
                const c = gameState.locationControl?.[id] || { russia:50, ukraine:50, control:'contested' };
                let cls = c.control==='russia'||c.russia>=65 ? 'russia' : c.control==='ukraine'||c.ukraine>=65 ? 'ukraine' : 'contested';
                const prev = prevControl[id];
                if (prev && prev !== cls) {
                    const locName = loc.name;
                    if (cls === 'russia') showEvent('🏴 Захват!', locName + ' перешёл под контроль ВС РФ!', '🔴');
                    else if (cls === 'ukraine') showEvent('🏴 Захват!', locName + ' перешёл под контроль ВСУ!', '🔵');
                    else if (prev !== 'contested') showEvent('⚔️ Бои!', 'Ожесточённые бои за ' + locName + '!', '🟠');
                }
                prevControl[id] = cls;
                const isCurrent = player && player.location === id;
                html += '<circle class="loc-point '+cls+(isCurrent?' current':'')+'" cx="'+loc.x+'" cy="'+loc.y+'" r="15" onclick="clickOnMap(\''+id+'\')"/>';
                html += '<text x="'+loc.x+'" y="'+(loc.y+4)+'" class="loc-label">'+loc.name.split(' ')[0]+'</text>';
                const locData = gameState.locations?.[id];
                if (locData?.buildings?.length) html += '<text x="'+loc.x+'" y="'+(loc.y-14)+'" class="building-icon" text-anchor="middle">'+locData.buildings.map(b=>BUILDING_EMOJI[b]||'').join('')+'</text>';
            });
            Object.values(gameState.players).filter(p=>p.alive).forEach(p => {
                const loc = LOC_COORDS[p.location]; if (!loc) return;
                html += '<circle cx="'+(loc.x+Math.sin(p.id.length*2.7)*12)+'" cy="'+(loc.y+Math.cos(p.id.length*2.7)*10)+'" r="4" fill="'+(p.faction==='russia'?'#ff4444':'#4488ff')+'" stroke="white" stroke-width="1" class="player-dot"><title>'+p.name+'</title></circle>';
            });
            svg.innerHTML = html;
            let rus=0,ukr=0,cont=0;
            Object.values(gameState.locationControl||{}).forEach(c=>{if(c.russia>=65)rus++;else if(c.ukraine>=65)ukr++;else cont++;});
            document.getElementById('rus-total').textContent=rus;
            document.getElementById('ukr-total').textContent=ukr;
            document.getElementById('cont-total').textContent=cont;
            document.getElementById('players-online').textContent=Object.values(gameState.players).filter(p=>p.alive).length;
            updateNewsTicker();
        }

        function clickOnMap(locId) {
            const loc = gameState.locationControl?.[locId], locData = gameState.locations?.[locId];
            let info = '📍 ' + (LOC_COORDS[locId]?.name||locId) + ': РФ ' + (loc?.russia||0) + '% / ВСУ ' + (loc?.ukraine||0) + '%';
            if (locData?.buildings?.length) info += ' | 🏗 ' + locData.buildings.join(', ');
            addMessage('system', info);
        }

        function addMessage(type, text) {
            const box = document.getElementById('messages-box');
            const div = document.createElement('div');
            div.className = 'msg ' + type;
            div.textContent = text;
            box.appendChild(div);
            const all = box.querySelectorAll('.msg');
            if (all.length > MAX_VISIBLE_MSGS) for (let i=0;i<all.length-MAX_VISIBLE_MSGS;i++) all[i].classList.add('old');
            box.scrollTop = box.scrollHeight;
        }

        function setInputEnabled(e) { document.getElementById('action-input').disabled=!e; document.getElementById('btn-send').disabled=!e; }

        document.getElementById('action-input').addEventListener('keypress', e=>{if(e.key==='Enter')sendAction();});
        document.getElementById('faction-input').addEventListener('keypress', e=>{if(e.key==='Enter')sendFactionMessage();});

        async function pollState() {
            try {
                const resp = await fetch('/api/state');
                const data = await resp.json();
                gameState = data;
                updateMap();
                updatePlayersOnLocation();
                if (!player && savedPlayerId && data.players[savedPlayerId]?.alive) {
                    player = data.players[savedPlayerId];
                    initInventory();
                    document.getElementById('auth-screen').classList.add('hidden');
                    document.getElementById('player-bar').classList.add('active');
                    document.getElementById('tab-bar').classList.add('active');
                    document.getElementById('quick-actions').classList.add('active');
                    document.getElementById('action-input').disabled=false;
                    document.getElementById('btn-send').disabled=false;
                    document.getElementById('unit-flag').textContent = UNIT_EMOJI[player.faction]?.[player.unit] || '';
                    document.getElementById('disp-name').textContent = player.name;
                    document.getElementById('btn-respawn').style.display='none';
                    if (player.class==='medic'){document.getElementById('btn-heal').style.display='inline-block';document.getElementById('disp-supplies').style.display='inline';}
                    document.getElementById('class-info').textContent = '🎖 ' + CLASS_BUFFS[player.class].name;
                    updatePlayerUI(); updateMap(); updatePlayersOnLocation();
                    addMessage('system', '👋 С возвращением, ' + player.name + '!');
                }
                if (player && data.players[player.id]) {
                    const sp = data.players[player.id];
                    if (sp.hp!==player.hp||sp.maxHp!==player.maxHp||sp.rank!==player.rank||sp.supplies!==player.supplies){Object.assign(player,sp);updatePlayerUI();}
                    if (!sp.alive && player.alive){player.alive=false;addMessage('kill','💀 Ты погиб!');handleDeath();}
                }
            } catch(e){}
        }
        setInterval(pollState, 8000);
        document.getElementById('move-modal').addEventListener('click', function(e){if(e.target===this)this.style.display='none';});

        addMessage('system', '⚔️ WarZone RP 3.0 готов. Выбери сторону!');
        pollState();
    </script>
</body>
